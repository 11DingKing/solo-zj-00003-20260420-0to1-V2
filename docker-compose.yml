version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: appointment_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: appointment_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: appointment_server
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=appointment_system

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: appointment_client
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - API_URL=http://server:8080

volumes:
  postgres_data:
